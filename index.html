<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b1022" />
  <title>secret vibe</title>
  <style>
    :root{
      --bg1:#0b1022; --bg2:#050814;
      --a:#7c5cff; --b:#5fffd2; --p:#ff2c55;
      --text:rgba(255,255,255,.95);
      --muted:rgba(255,255,255,.72);
      --card:rgba(255,255,255,.07);
      --stroke:rgba(255,255,255,.12);
      --r:22px;
    }
    *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
      background:
        radial-gradient(900px 650px at 20% 15%, rgba(124,92,255,.26), transparent 55%),
        radial-gradient(900px 650px at 80% 30%, rgba(95,255,210,.16), transparent 55%),
        radial-gradient(900px 650px at 55% 85%, rgba(255,44,85,.10), transparent 55%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      padding: env(safe-area-inset-top) 14px env(safe-area-inset-bottom) 14px;
      overflow:hidden;
    }
    .wrap{ width:min(440px,100%); text-align:center; }
    .eyes{
      display:inline-flex; gap:10px; align-items:center; justify-content:center;
      padding:10px 12px; border-radius:999px;
      border:1px solid var(--stroke); background:rgba(255,255,255,.06);
      box-shadow: 0 18px 50px rgba(0,0,0,.45);
      margin-bottom:14px;
    }
    .eye{
      width:38px; height:26px; border-radius:999px;
      background: rgba(255,255,255,.92);
      position:relative; overflow:hidden;
      box-shadow: inset 0 -2px 0 rgba(0,0,0,.10);
    }
    .pupil{
      width:11px;height:11px;border-radius:50%;
      background:#050814;
      position:absolute; left:50%; top:50%;
      transform: translate(-50%,-50%);
      transition: transform 120ms ease;
    }
    .lid{
      position:absolute; inset:-10px 0 0 0;
      background: rgba(11,16,34,.96);
      transform: translateY(-120%);
      border-bottom-left-radius:999px; border-bottom-right-radius:999px;
      pointer-events:none;
    }
    .blink .lid{ animation: blink 240ms ease; }
    @keyframes blink{
      0%{ transform: translateY(-120%); }
      45%{ transform: translateY(10%); }
      100%{ transform: translateY(-120%); }
    }

    h1{ margin:0 0 6px; font-size:28px; font-weight:1000; letter-spacing:-.6px; }
    .sub{ margin:0 0 20px; color:var(--muted); font-size:14px; line-height:1.35; }

    .hold{
      width:180px;height:180px;border-radius:50%;
      margin:18px auto 10px;
      display:flex; align-items:center; justify-content:center;
      font-weight:1000; letter-spacing:.8px;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.12), rgba(255,255,255,.04));
      border:1px solid rgba(255,255,255,.16);
      box-shadow: 0 18px 50px rgba(0,0,0,.45);
      user-select:none;
      touch-action:none;
      cursor:pointer;
      position:relative;
    }
    .ring{
      position:absolute; inset:-6px; border-radius:999px;
      background: conic-gradient(from 180deg, var(--a), var(--b), var(--p), var(--a));
      opacity:0; transform: scale(.92);
      transition: opacity .18s ease, transform .18s ease;
      pointer-events:none;
    }
    .ring.on{ opacity:.85; transform: scale(1); }
    .ringMask{
      position:absolute; inset:6px; border-radius:999px;
      background: rgba(10,14,26,.95);
      backdrop-filter: blur(10px);
      pointer-events:none;
    }
    .progressText{ min-height:18px; color:var(--muted); font-size:13px; }

    .result{ display:none; margin-top:18px; }
    .score{ font-size:34px; font-weight:1000; margin:0 0 10px; }
    .card{
      background: var(--card);
      border:1px solid var(--stroke);
      border-radius: var(--r);
      padding:16px;
    }
    .blurDot{
      width:74px;height:74px;border-radius:50%;
      margin:10px auto 6px;
      background: linear-gradient(135deg,var(--a),var(--b));
      filter: blur(14px);
      transition: filter .35s ease;
      box-shadow: 0 18px 40px rgba(0,0,0,.35);
    }
    .unlock{ font-size:13px; color:var(--muted); line-height:1.35; }
    .btnRow{ display:flex; gap:10px; margin-top:14px; }
    .btn{
      flex:1;
      border:none;
      border-radius:16px;
      padding:14px 14px;
      font-weight:900;
      cursor:pointer;
      background: linear-gradient(135deg,var(--a),var(--b));
      color:#061018;
    }
    .btn.secondary{
      background: rgba(255,255,255,.10);
      color: rgba(255,255,255,.92);
      border:1px solid var(--stroke);
    }
    .toast{
      position:fixed; left:50%;
      transform:translateX(-50%);
      bottom: calc(env(safe-area-inset-bottom) + 16px);
      background: rgba(0,0,0,.72);
      border:1px solid rgba(255,255,255,.16);
      padding:10px 12px;
      border-radius:999px;
      font-size:13px;
      opacity:0;
      pointer-events:none;
      transition: opacity .18s ease, transform .18s ease;
      backdrop-filter: blur(10px);
    }
    .toast.show{ opacity:1; transform:translateX(-50%) translateY(-6px); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="eyes" id="eyes">
      <div class="eye"><div class="lid"></div><div class="pupil" id="pL"></div></div>
      <div class="eye"><div class="lid"></div><div class="pupil" id="pR"></div></div>
    </div>

    <h1>someone you know picked you</h1>
    <p class="sub">hold to reveal your vibe • this is a fun mystery game (no real contacts)</p>

    <div class="hold" id="hold">
      <div class="ring" id="ring"></div>
      <div class="ringMask"></div>
      HOLD
    </div>
    <div class="progressText" id="progress"></div>

    <div class="result" id="result">
      <p class="score" id="scoreText">MATCH 0% 💜</p>

      <div class="card">
        <div class="blurDot" id="preview"></div>
        <div class="unlock" style="margin-bottom:10px;">someone reacted to your vibe</div>
        <div class="unlock" id="shareProgress">unlock bonus reveal after 3 shares</div>

        <div class="btnRow">
          <button class="btn" id="shareBtn">share</button>
          <button class="btn secondary" id="storyBtn">story card</button>
        </div>

        <div class="btnRow" style="margin-top:10px;">
          <button class="btn secondary" id="resetBtn">again</button>
          <button class="btn secondary" id="copyBtn">copy link</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">ok</div>

<script>
  const hold = document.getElementById('hold');
  const ring = document.getElementById('ring');
  const result = document.getElementById('result');
  const progress = document.getElementById('progress');
  const scoreText = document.getElementById('scoreText');
  const preview = document.getElementById('preview');
  const shareProgress = document.getElementById('shareProgress');
  const toastEl = document.getElementById('toast');

  const eyes = document.getElementById('eyes');
  const pL = document.getElementById('pL');
  const pR = document.getElementById('pR');

  function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(()=>toastEl.classList.remove('show'), 1400);
  }

  // eyes micro-animation
  function setPupils(dx, dy){
    const clamp = (v,m)=>Math.max(-m,Math.min(m,v));
    const x = clamp(dx, 7), y = clamp(dy, 5);
    pL.style.transform = `translate(-50%,-50%) translate(${x}px,${y}px)`;
    pR.style.transform = `translate(-50%,-50%) translate(${x}px,${y}px)`;
  }
  function blink(){
    eyes.classList.remove('blink');
    void eyes.offsetWidth;
    eyes.classList.add('blink');
  }
  function jolt(){
    setPupils((Math.random()*2-1)*5, (Math.random()*2-1)*3);
    setTimeout(()=>setPupils(0,0), 180);
    if(Math.random()<.7) setTimeout(blink, 60);
  }
  setTimeout(jolt, 150);
  setTimeout(jolt, 520);
  setInterval(()=>{ if(document.visibilityState==='visible') jolt(); }, 3200);

  // state
  const KEY = "sv_shares_v2";
  let shares = parseInt(localStorage.getItem(KEY) || "0", 10);
  if(isNaN(shares)) shares = 0;

  function updateShareUI(){
    shareProgress.textContent = `${shares}/3 shares`;
    let blur = 14 - (shares*4);
    if(blur < 0) blur = 0;
    preview.style.filter = `blur(${blur}px)`;
    if(shares >= 3){
      shareProgress.textContent = `unlocked ✅ (${shares}/3)`;
      preview.style.filter = "blur(0px)";
    }
  }
  updateShareUI();

  // hold interaction (stable)
  let holdTimer = null;
  let step = 0;
  let revealed = false;

  function reveal(){
    revealed = true;
    ring.classList.remove('on');
    const score = Math.floor(Math.random()*100);
    scoreText.textContent = `MATCH ${score}% 💜`;
    result.style.display = "block";
    progress.textContent = "";
    if(navigator.vibrate) navigator.vibrate([15,40,15]);
    jolt();
  }

  function startHold(e){
    e.preventDefault();
    if(revealed) return;
    step = 0;
    ring.classList.add('on');
    progress.textContent = "analyzing vibe…";
    if(navigator.vibrate) navigator.vibrate(10);

    clearInterval(holdTimer);
    holdTimer = setInterval(()=>{
      step++;
      if(step===1) progress.textContent = "syncing energy…";
      if(step===2) progress.textContent = "checking match…";
      if(step>=3){
        clearInterval(holdTimer);
        holdTimer = null;
        reveal();
      }
    }, 520);
  }

  function endHold(){
    if(revealed) return;
    ring.classList.remove('on');
    clearInterval(holdTimer);
    holdTimer = null;
    progress.textContent = "";
  }

  hold.addEventListener('pointerdown', startHold);
  window.addEventListener('pointerup', endHold);
  window.addEventListener('pointercancel', endHold);

  // Decrypt animation
  function fakeDecrypt(){
    let i = 0;
    const steps = ["decrypting… 25%","decrypting… 50%","decrypting… 75%","profile unlocked ✅"];
    const t = setInterval(()=>{
      progress.textContent = steps[i] || steps[steps.length-1];
      i++;
      if(i >= steps.length){
        clearInterval(t);
        setTimeout(()=>{ progress.textContent = ""; }, 900);
      }
    }, 380);
  }

  async function share(){
    const url = location.href;
    const payload = { title:"secret vibe", text:"👀 someone you know picked you", url };

    // We must NOT crash if user cancels share.
    let attempted = false;

    if(navigator.share){
      try{
        attempted = true;
        await navigator.share(payload);
        // resolve: user completed OR sheet closed — both are ok for UX
      }catch(err){
        // cancel or error -> still continue UX
        showToast("share closed");
      }
    } else {
      try{
        await navigator.clipboard.writeText(url);
        attempted = true;
        showToast("link copied");
      }catch(err){
        showToast("copy not available");
      }
    }

    // Count after any attempt (keeps flow viral & avoids stuck)
    if(attempted || navigator.share){
      shares += 1;
      localStorage.setItem(KEY, String(shares));
      updateShareUI();
      fakeDecrypt();
    }
  }

  document.getElementById('shareBtn').addEventListener('click', share);

  // Story card
  function story(){
    if(result.style.display !== "block"){
      showToast("reveal first");
      return;
    }
    const W=1080, H=1920;
    const c = document.createElement('canvas');
    c.width=W; c.height=H;
    const ctx=c.getContext('2d');

    // bg
    const g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#0b1022'); g.addColorStop(1,'#050814');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

    const glow=(x,y,r,rgba)=>{
      const rg=ctx.createRadialGradient(x,y,0,x,y,r);
      rg.addColorStop(0,rgba); rg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=rg; ctx.fillRect(0,0,W,H);
    }
    glow(W*0.35,H*0.25,520,'rgba(124,92,255,.30)');
    glow(W*0.78,H*0.30,520,'rgba(95,255,210,.18)');
    glow(W*0.55,H*0.78,600,'rgba(255,44,85,.14)');

    // text
    ctx.fillStyle='rgba(255,255,255,.94)';
    ctx.font='900 88px system-ui, -apple-system, Segoe UI, Roboto';
    ctx.fillText('secret vibe 👀', 130, 320);

    ctx.fillStyle='rgba(255,255,255,.72)';
    ctx.font='800 52px system-ui, -apple-system, Segoe UI, Roboto';
    ctx.fillText('someone you know picked me', 130, 400);

    ctx.fillStyle='#5fffd2';
    ctx.font='1000 170px system-ui, -apple-system, Segoe UI, Roboto';
    ctx.fillText(scoreText.textContent, 130, 640);

    ctx.fillStyle='rgba(255,255,255,.65)';
    ctx.font='800 44px system-ui, -apple-system, Segoe UI, Roboto';
    ctx.fillText('try it →', 130, 760);

    ctx.fillStyle='rgba(255,255,255,.45)';
    ctx.font='700 34px system-ui, -apple-system, Segoe UI, Roboto';
    ctx.fillText(location.host || 'share this link', 130, H-120);

    const dataUrl = c.toDataURL('image/png');

    const a=document.createElement('a');
    a.href=dataUrl;
    a.download='secret-vibe-story.png';
    document.body.appendChild(a);
    a.click();
    a.remove();
    showToast("story saved");
  }
  document.getElementById('storyBtn').addEventListener('click', story);

  document.getElementById('resetBtn').addEventListener('click', ()=>{
    revealed = false;
    result.style.display = "none";
    progress.textContent = "";
    ring.classList.remove('on');
    showToast("again");
  });

  document.getElementById('copyBtn').addEventListener('click', async ()=>{
    try{
      await navigator.clipboard.writeText(location.href);
      showToast("link copied");
    }catch(e){
      showToast("copy not available");
    }
  });
</script>
</body>
</html>
